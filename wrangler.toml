name = "qwen3-tts-webui"
compatibility_date = "2025-01-01"

# Wrangler runs this build step automatically before deploying.
# The CF dashboard's "Build command" is optional in the Workers+Assets
# model — the canonical place for the build is here in wrangler.toml.
[build]
command = "npm run build"

# Serve ./dist as static assets — no Worker script needed.
# main is intentionally omitted (assets-only Worker).
[assets]
directory = "./dist"
